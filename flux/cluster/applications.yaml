---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications
  namespace: flux-system
spec:
  interval: 1m0s
  timeout: 10m0s
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-applications
  path: ./applications
  dependsOn:
    - name: traefik
    - name: authentik
    - name: cloudnativepg
