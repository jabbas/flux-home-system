---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnativepg-operator
  namespace: cloudnativepg-system
spec:
  chart:
    spec:
      chart: cloudnative-pg
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cloudnativepg
        namespace: flux-system
  interval: 1m0s
  values:
    resources:
      requests:
        cpu: 25m
        memory: 100Mi
      limits:
        memory: 256Mi
