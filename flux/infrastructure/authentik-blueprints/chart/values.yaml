nameOverride: ""
fullnameOverride: ""

# Brand configuration
# NOTE: `domain` here is authentik's brand IDENTIFIER, not the ingress hostname.
# It MUST match authentik's built-in default brand, which the authentik bootstrap
# always creates with domain "authentik-default" and default: true.
# The Recovery Flow blueprint (templates/blueprint-recovery-flow.yaml) sets
# `default: true` on this brand. If the identifier does NOT match the existing
# default brand, authentik rejects it with "Only a single brand can be set as
# default." — which fails the whole blueprint transaction and rolls back the
# recovery flow, leaving the instance with no way to send recovery emails.
# Therefore this must stay "authentik-default" so the blueprint UPDATES the
# existing default brand instead of creating a conflicting second one.
brand:
  domain: authentik-default
  title: Authentik

# Groups to create
groups:
  - name: kubernetes-admins
    superuser: false
  - name: monitoring-admins
    superuser: false

# Users to create
users:
  - username: jabbas
    email: jabbas@jabbas.eu
    name: Grzegorz Dzięgielewski
    superuser: true
    groups:
      - kubernetes-admins
      - authentik Admins
      - monitoring-admins

# OIDC configuration
oidc:
  talos:
    clientId: talos-cluster-id
    icon: https://raw.githubusercontent.com/devicons/devicon/master/icons/talos/talos-original.svg
    redirectUris:
      - url: http://localhost:8000
      - url: http://localhost:18000
      - url: https://headlamp.dev.home/oidc-callback
      - url: http://headlamp.dev.home/oidc-callback

  headlamp:
    enabled: true
    icon: https://raw.githubusercontent.com/kubernetes-sigs/headlamp/refs/heads/main/docker-extension/headlamp.svg

  victoriaMetrics:
    clientId: victoria-metrics-id
    icon: https://avatars.githubusercontent.com/u/43720803  # VictoriaMetrics GitHub org avatar (old victoriametrics.com/images/logo.svg now 404s)

  grafana:
    clientId: grafana-id
    icon: https://grafana.com/static/assets/img/fav32.png

# RBAC for OIDC users
clusterAdminUsers:
  - jabbas
clusterAdminGroups:
  - kubernetes-admins

