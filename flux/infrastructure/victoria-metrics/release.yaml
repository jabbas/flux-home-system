---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-stack
  namespace: victoria-metrics
spec:
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
  interval: 1m0s
  timeout: 10m0s
  install:
    remediation:
      retries: 3
  values:
    # Shorten generated names to stay under 63 char limit
    fullnameOverride: vm

    # VM Operator
    victoria-metrics-operator:
      enabled: true
      operator:
        disable_prometheus_converter: false
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    # VMCluster - HA storage
    vmcluster:
      enabled: true
      spec:
        retentionPeriod: "30d"
        replicationFactor: 2

        vmstorage:
          replicaCount: 2
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: zfs-nfs-csi
                resources:
                  requests:
                    storage: 20Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          extraArgs:
            memory.allowedPercent: "20"
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmstorage
                  managed-by: vm-operator

        vmselect:
          replicaCount: 2
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmselect
                  managed-by: vm-operator

        vminsert:
          replicaCount: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vminsert
                  managed-by: vm-operator

    # Disable vmsingle (using vmcluster instead)
    vmsingle:
      enabled: false

    # vmagent - HA scraping
    vmagent:
      enabled: true
      spec:
        replicaCount: 2
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vmagent
                managed-by: vm-operator

    # vmalert - HA alerting
    vmalert:
      enabled: true
      spec:
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vmalert
                managed-by: vm-operator

    # Alertmanager - HA
    alertmanager:
      enabled: true
      spec:
        replicaCount: 2
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi
        configSecret: alertmanager-config
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vmalertmanager
                managed-by: vm-operator

    # Grafana disabled (using vmui)
    grafana:
      enabled: false

    # Default scrape configs
    kubelet:
      enabled: true
    kubeApiServer:
      enabled: true
    kubeControllerManager:
      enabled: true
    kubeScheduler:
      enabled: true
    kubeEtcd:
      enabled: true
    coreDns:
      enabled: true
    kubeProxy:
      enabled: true

    # kube-state-metrics
    kube-state-metrics:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi

    # node-exporter (Prometheus-style)
    # Disabled due to Talos PodSecurity restrictions (requires hostNetwork, hostPID, hostPath)
    prometheus-node-exporter:
      enabled: false

    # Default alerting rules
    defaultRules:
      create: true
      rules:
        etcd: true
        general: true
        k8s: true
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: true
        kubeApiserverHistogram: true
        kubeApiserverSlos: true
        kubeControllerManager: true
        kubelet: true
        kubeProxy: true
        kubeSchedulerAlerting: true
        kubeSchedulerRecording: true
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        vmagent: true
        vmhealth: true
