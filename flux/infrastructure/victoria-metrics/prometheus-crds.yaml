---
# Prometheus Operator CRDs required by VictoriaMetrics operator's prometheus converter.
# These CRDs allow using ServiceMonitor, PodMonitor, Probe, PrometheusRule, and ScrapeConfig
# resources that get automatically converted to VM-native equivalents.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: victoria-metrics
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-operator-crds
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
